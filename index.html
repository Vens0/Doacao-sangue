<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <div id="bloco">


        <h2>Formulário de Doação de Sangue</h2>

        <form id="formsangue">


            <div class="espaco">
                <label for="nome">Nome completo:</label>



                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>


            <div class="espaco">
                <label for="email">Email:</label>


                <input type="text" id="email" placeholder="Digite seu email">
            </div>


            <div class="espaco">
                <label for="idade">Idade:</label>



                <input type="number" id="idade" placeholder="Qual sua idade?">
            </div>


            <div class="espaco">
                <label for="peso">Peso:</label>



                <input type="number" id="peso" placeholder="Qual seu peso?">
            </div>


            <div class="espaco">
                <label for="tiposangue">Tipo sanguíneo:</label>



                <select name="tiposangue" id="tiposangue">

                    <option value="">Opções</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>

                </select>
            </div>


            <div class="espaco">
                <label for="telefone">Telefone:</label>



                <input type="tel" id="telefone" placeholder="Digite seu telefone">
            </div>



            <div class="espaco">
                <label for="cidade">Cidade:</label>



                <input type="text" id="cidade" placeholder="Digite sua cidade">
            </div>


            <div class="espaco">
                <label for="estado">Estado:</label>



                <input type="text" id="estado" placeholder="Digite seu estado">
            </div>

            <button type="submit"> Enviar </button>


        </form>
    </div>
    
    <div id="resultado"></div>

    <script src="scripts/scripts.js"></script>



</body>

</html>
